<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUZIVO — DEI Knowledge Challenge | PGCN</title>
<style>
  :root{
    --navy:#0f2233; --mid:#1a3a5c; --gold:#F5A623;
    --blue:#4A90D9; --green:#27AE60; --white:#ffffff;
    --pink:#D81B8C; --purple:#9B59B6; --teal:#16A085; --red:#E74C3C; --orange:#E67E22;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#050e1a 0%,var(--mid) 55%,#0a2015 100%);
    min-height:100vh; color:#fff;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}
  .screen{padding:20px 16px; flex:1; display:flex; flex-direction:column;}
  .center{align-items:center; justify-content:center; text-align:center;}
  .maxw{max-width:440px; width:100%; margin:0 auto;}
  h1{font-size:46px; font-weight:900; letter-spacing:4px;}
  .eyebrow{color:var(--gold); font-size:9px; letter-spacing:.22em; text-transform:uppercase; margin-bottom:3px;}
  .sub{color:rgba(255,255,255,.75); font-size:12px; margin-bottom:3px;}
  .tag{color:var(--gold); font-size:9px; font-weight:bold; margin-bottom:10px;}
  .zones-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-bottom:10px;}
  .zone-chip{border-radius:9px; padding:7px 3px; text-align:center;}
  .zone-chip .ic{font-size:14px;}
  .zone-chip p{font-size:9px; font-weight:bold; margin-top:2px;}
  .feature-row{border-radius:12px; padding:9px; margin-bottom:9px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);}
  .feature-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:5px;}
  .feature-grid div{text-align:center;}
  .feature-grid p{font-size:9px; font-weight:bold; margin-top:1px; line-height:1.3;}
  .field-label{display:block; color:rgba(255,255,255,.85); font-size:12px; font-weight:600; margin-bottom:4px;}
  input:focus-visible, select:focus-visible, button:focus-visible, [onclick]:focus-visible{
    outline:3px solid var(--gold); outline-offset:2px;
  }
  input::placeholder{color:rgba(255,255,255,.55);}
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
    .confetti-piece{display:none;}
  }
  .flip-wrap{perspective:900px;margin-bottom:8px;cursor:pointer;height:158px;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d;}
  .flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;padding:11px;overflow-y:auto;}
  .flip-back{transform:rotateY(180deg);}
  .sndbtn{position:fixed;top:10px;right:10px;z-index:99;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);font-size:16px;cursor:pointer;}
  .selfbtn{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);color:#fff;font-weight:bold;font-size:14px;cursor:pointer;}
  .selfbtn.active{background:var(--gold);color:#000;border-color:var(--gold);}
  .support-box{border-radius:14px;padding:13px;margin-top:12px;text-align:center;background:linear-gradient(135deg,rgba(245,166,35,.10),rgba(39,174,96,.08));border:1px solid rgba(245,166,35,.45);}
  .pay-chip{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:bold;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.5);color:var(--gold);}
  /* Tablet */
  @media (min-width:700px){
    #app{zoom:1.15;}
    .maxw{max-width:540px;}
  }
  /* Desktop */
  @media (min-width:1100px){
    #app{zoom:1.3;}
    .maxw{max-width:580px;}
  }
  input, select{
    width:100%; padding:12px; border-radius:12px; background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15); color:#fff; font-size:14px; text-align:center;
  }
  select{text-align:left;}
  .btn{
    width:100%; padding:12px; border-radius:12px; background:var(--gold); color:#000;
    font-weight:900; font-size:14px; border:none; cursor:pointer; margin-top:8px;
  }
  .btn.secondary{background:rgba(255,255,255,.08); color:rgba(255,255,255,.85); font-weight:700;}
  .btn.ghost{background:none; color:rgba(255,255,255,.65); font-size:12px; border:none; padding:12px;}
  .langbar{display:flex; gap:4px; align-items:center; flex-wrap:wrap; justify-content:center;}
  .langbtn{padding:8px 12px; border-radius:20px; font-size:11px; font-weight:bold; background:rgba(255,255,255,.1); color:rgba(255,255,255,.75); border:none; cursor:pointer;}
  .langbtn.active{background:var(--gold); color:#000;}
  .contact-box{border-radius:10px; padding:7px 12px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); margin-top:8px;}
  .contact-box p{font-size:8px;}
  .zonebtn{
    border-radius:14px; padding:11px 13px; display:flex; align-items:center; gap:11px;
    background:rgba(255,255,255,.03); border:2px solid rgba(255,255,255,.05); width:100%;
    cursor:pointer; text-align:left; margin-bottom:8px; color:#fff;
  }
  .zonebtn.active{cursor:pointer;}
  .zonebtn.locked{opacity:.3; cursor:default;}
  .zonebtn.done{cursor:default;}
  .zone-icon{width:42px; height:42px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .zone-info{flex:1;}
  .zone-info .zlabel{font-size:9px; font-weight:bold; letter-spacing:.07em; margin-bottom:1px;}
  .zone-info .zname{font-size:12px; font-weight:bold; margin-bottom:1px;}
  .zone-info .zsub{font-size:9px; color:rgba(255,255,255,.7);}
  .zone-right{text-align:right; flex-shrink:0;}
  .zone-right .zscore{font-weight:bold; font-size:11px;}
  .zone-right .zcount{font-size:9px; color:rgba(255,255,255,.2);}
  .qcard{border-radius:16px; padding:14px; margin-bottom:11px;}
  .badge{font-size:9px; padding:2px 8px; border-radius:20px; font-weight:bold; display:inline-block; margin-bottom:8px;}
  .qtext{color:#fff; font-weight:600; font-size:13px; line-height:1.65;}
  .opt{
    text-align:left; padding:11px 12px; border-radius:11px; background:rgba(255,255,255,.05);
    border:1.5px solid rgba(255,255,255,.08); color:rgba(255,255,255,.8); font-size:12px;
    font-weight:500; cursor:pointer; width:100%; margin-bottom:7px; display:block;
  }
  .opt .oletter{font-weight:bold; margin-right:7px;}
  .opt .oflag{float:right;}
  .progress-track{width:100%; background:rgba(255,255,255,.08); border-radius:4px; height:2px; margin:6px 15px; max-width:calc(100% - 30px);}
  .progress-fill{height:2px; border-radius:4px; transition:width .4s;}
  .timer-ring{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative;}
  .timer-inner{width:20px; height:20px; border-radius:50%; background:linear-gradient(160deg,#050e1a,var(--mid)); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:900;}
  .topbar{padding:12px 15px 0; display:flex; justify-content:space-between; align-items:center;}
  .lives{font-size:14px;}
  .hint-btn{margin-top:8px; padding:10px 14px; border-radius:10px; background:rgba(255,255,255,.05); border:1px dashed rgba(255,255,255,.3); color:rgba(255,255,255,.7); font-size:12px; cursor:pointer; width:100%;}
  .explain{margin-top:10px; padding:12px; border-radius:12px;}
  .likert-card{border-radius:20px; padding:18px; margin-bottom:16px; text-align:center;}
  .likert-opt{padding:11px 13px; border-radius:11px; background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.1); color:rgba(255,255,255,.85); font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:9px; text-align:left; width:100%; margin-bottom:6px;}
  .likert-num{width:22px; height:22px; border-radius:50%; border:2px solid; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; flex-shrink:0;}
  .concept-card{border-radius:13px; padding:13px; margin-bottom:9px;}
  .concept-card .ck{font-weight:bold; font-size:11px; margin-bottom:4px;}
  .concept-card .cv{color:rgba(255,255,255,.75); font-size:11px; line-height:1.65;}
  .cert-wrap{max-width:440px; width:100%; margin:0 auto; border-radius:22px; overflow:hidden; border:2px solid var(--blue);}
  .cert-header{background:linear-gradient(135deg,#0a1a2e,#08251a); padding:20px; text-align:center;}
  .stat-box{border-radius:8px; padding:8px 3px; text-align:center;}
  .dimbar-row{margin-bottom:5px;}
  .dimbar-track{width:100%; background:rgba(255,255,255,.08); border-radius:4px; height:6px;}
  .dimbar-fill{height:6px; border-radius:4px; transition:width 1.2s cubic-bezier(.4,0,.2,1); width:0%;}
  .lb-row{border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); margin-bottom:6px;}
  .me-stat{border-radius:12px; padding:12px 8px; text-align:center;}
  .footer-note{color:rgba(255,255,255,.1); font-size:8px; text-align:center; margin-top:10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes cFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  .confetti-piece{position:fixed; top:-12px; pointer-events:none; z-index:200; animation:cFall linear forwards;}
</style>
</head>

  1:[{s:"A colleague insists: 'Tribalism ended at independence in 1980. Why keep raising it?'",a:"Acknowledge legal change, then distinguish law from socialisation :- values absorbed over generations do not expire with a constitution.",e:"The Cycle of Socialisation persists beyond legislation. Naming this is the Waking Up stage of liberation, not divisiveness."},

  3:[{s:"Your school gives every learner an identical bursary amount and calls it fair.",a:"Explain that identical treatment is equality; equity would weight support toward learners facing the steepest barriers, such as girls at risk of dropout.",e:"Equality removes no structural barrier by itself. Equity deliberately elevates the historically disadvantaged."},
     {s:"A boys' mentorship programme on positive masculinity is attacked as 'anti-girls.'",a:"Defend it through the both/and imperative :- empowering girls AND transforming boys addresses the structure, not just the symptom.",e:"Gender justice that ignores boys leaves the system that produces harm untouched."}],

{z:8,t:"scenario",p:20,q:"A Form 3 girl misses school days every month. Classmates tease her; a male teacher shrugs: 'girls just miss school.' Your integrated response:",o:["Advise her to try harder to attend","Address the material need (products, WASH facilities) AND privately name the teacher's framing, then propose a school-level policy","Report the teacher to the head immediately and publicly","Ask her parents to manage the problem at home"],a:1,e:"Period poverty (Zone 4) meets gender framing (Zone 3) and in-the-moment leadership (Zone 6). Equity responses fix the structure and the narrative, not the girl."},
{z:8,t:"scenario",p:20,q:"After drought hits Ward 3, the water committee deciding borehole placement is all-male, though women and girls fetch the water. Best action:",o:["Proceed :- the committee was democratically chosen","Ask the men to consult their wives at home","Restructure the committee so those with lived experience of water burden hold decision seats","Wait for the next election cycle"],a:2,e:"Positive Peace (Zone 6) requires equitable decision structures; gender equity (Zone 3) requires deliberate inclusion; climate adaptation (Zone 2 context) fails without the knowledge of those who carry the burden."},
{z:8,t:"scenario",p:20,q:"An adult directs several children begging at a growth point during school hours. A colleague says: 'leave it, that is their culture.' You:",o:["Respect the cultural framing and move on","Give the children money directly","Recognise organised child economic exploitation under ILO 182 and engage child protection channels","Confront the adult publicly on the spot"],a:2,e:"Zone 4 protection knowledge plus Zone 1 socialisation analysis :- 'culture' is being used to normalise exploitation. Protection channels, not confrontation or charity, protect the children."},
{z:8,t:"scenario",p:20,q:"A new teacher from Matabeleland faces slurs in your staffroom referencing 1980s history. The room stays silent. Your first move:",o:["Stay out of regional politics","Name the harm at the appropriate level, ground the standard in Hunhu, and raise the historical wound with leadership as an institutional matter","Advise the teacher to develop thicker skin","Send an anonymous complaint"],a:1,e:"Zone 2 history, Zone 1 Ubuntu and Zone 6 in-the-moment action integrate :- public harm requires the room to hear the standard, and historical wounds require institutional, not personal, response."},
{z:8,t:"scenario",p:20,q:"A donor insists a Sahel youth climate fund be 'strictly gender-neutral to be fair.' Your equity-grounded reply:",o:["Agree :- neutrality guarantees fairness","Explain that neutral access replicates existing barriers; disaggregate the data and deliberately weight access for young women","Reject the fund entirely","Accept now, adjust quietly later"],a:1,e:"Equality versus equity (Zone 3) applied to climate finance (Zone 2 context) :- neutral rules on an unequal field produce unequal outcomes. Equity is corrective by design."},
{z:8,t:"scenario",p:20,q:"A school WASH club: girls do most of the work while boys hold all leadership posts. The integrated fix:",o:["Praise the girls' work ethic publicly","Rotate titles alphabetically","Build girls' leadership capacity through coaching AND restructure the club's roles :- both the people and the structure","Dissolve the club"],a:2,e:"Zone 3 both/and plus Zone 6 coaching leadership :- developing individuals without changing the structure, or vice versa, leaves the pattern intact."},
{z:8,t:"scenario",p:20,q:"After a cyclone, relief registration requires national ID :- excluding child-headed households whose documents were destroyed. You:",o:["Follow procedure :- rules are rules","Adapt verification (community attestation) so the most vulnerable access relief, and flag the documentation barrier upward","Tell the children to apply for IDs first","Distribute privately to avoid the system"],a:1,e:"Zone 2 documentation history, Zone 4 child rights and Zone 6 equitable distribution converge :- procedure that excludes the most vulnerable is structural harm wearing a uniform."},

{z:1,t:"mcq",p:10,q:"The Cycle of Socialisation and Cycle of Liberation were developed by:",o:["Paulo Freire","Bobbie Harro","bell hooks","Stanlake Samkange"],a:1,e:"Bobbie Harro's frameworks map how systems shape identity before awareness, and how liberation becomes possible through collective action."},
{z:1,t:"tf",p:10,q:"Socialisation begins before we are conscious of it, absorbed through family and early community.",a:true,e:"We absorb values and identity markers from birth. Unlearning requires sustained, intentional effort."},
{z:1,t:"mcq",p:10,q:"The Shona concept that directly parallels Ubuntu philosophy is:",o:["Lobola","Nhaka","Hunhu","Gota"],a:2,e:"Hunhu, formalised as Zimbabwean political philosophy by Stanlake Samkange in 1980."},
{z:1,t:"mcq",p:10,q:"Ubuntu 'umuntu ngumuntu ngabantu' most directly supports:",o:["Individual achievement as the ultimate goal","Collective responsibility, equity requires community not just personal action","Merit systems as inherently neutral","Western frameworks as universally applicable"],a:1,e:"Ubuntu frames equity as a communal obligation. The village is incomplete when any member is excluded."},
{z:1,t:"scenario",p:20,q:"A colleague says: 'I treat everyone the same, I don't see gender.' You:",o:["Agree, treating everyone the same is equality","Name the worldview: gender-blindness erases lived experience and is not equity","Stay silent to preserve the relationship","Refer the matter to HR"],a:1,e:"Gender-blindness denies structural disadvantage. Equity requires seeing difference and responding with deliberate, corrective action."},
{z:1,t:"mcq",p:10,q:"The Cycle of Liberation begins with:",o:["Coalition building","Taking organised social action","Waking up, introspection and growing awareness","Changing national institutions"],a:2,e:"Liberation begins internally. You cannot change what you cannot see."},
{z:1,t:"tf",p:10,q:"Dominant group members often experience their own identity as 'default' rather than as a socialised identity.",a:true,e:"Creating space for this recognition without shame is a foundational DEI practitioner skill."},
{z:1,t:"mcq",p:10,q:"Why is personal storytelling foundational in DEI work?",o:["It is easier than data","Stories surface how systems shaped our identity, making invisible socialisation visible","It replaces academic DEI frameworks","It builds relationships without intellectual engagement"],a:1,e:"Storytelling is epistemological, the stories we carry contain evidence of how systems have shaped us."},
{z:1,t:"tf",p:10,q:"A DEI practitioner's first obligation is to change others, personal self-awareness is secondary.",a:false,e:"False. DEI work must begin with self. You cannot facilitate transformation in others that you have not begun in yourself."},

function computeProfile(answers, dims, questions){
  const buckets={}; dims.forEach(d=>buckets[d.id]=[]);
  questions.forEach((q,i)=>{ let v=answers[i]||3; if(q.reverse) v=6-v; buckets[q.dim].push(v); });
  const scores={}; dims.forEach(d=>{ const a=buckets[d.id]; scores[d.id]=Math.round(((a.reduce((x,y)=>x+y,0)/a.length-1)/4)*100); });
  const overall=Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/dims.length);
  const strongest=dims.reduce((best,d)=>scores[d.id]>scores[best.id]?d:best,dims[0]);
  return {scores, overall, strongest};
}

async function savePlayer(deiProf){
  const data = {
    timestamp:new Date().toISOString(), name:S.name, country:S.country,
    organisation:(S.org||"N/A")+(S.role?" · "+S.role:""),
    zone:"Zones "+S.done.length+"/8 · Badges "+S.passed.length+(S.capstonePassed?" · CAPSTONE ★":""),
    score:S.score, badge:(deiProf&&deiProf.profile)||"—",
    assessment:pct()+"% accuracy · "+((S.z5Profile&&S.z5Profile.level)||"—")+" · Self baseline "+(S.preSelf||"—")+"/5 · ID "+certId(),
    duration:Math.round((Date.now()-S.startedAt)/60000)+" min",
    device:/Mobi|Android/i.test(navigator.userAgent)?"Mobile":"Desktop",
    org:S.org, role:S.role, pct:pct(), deiProfile:(deiProf&&deiProf.profile)||"—",
    practitionerLevel:(S.z5Profile&&S.z5Profile.level)||"—", zonesCompleted:S.done.length
  };
  if(CONFIG.API_URL){
    try{
      await fetch(CONFIG.API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(data)});
    }catch(e){ console.warn("Backend save failed, falling back to local storage.", e); }
  }
  try{
    const local = JSON.parse(localStorage.getItem("ruzivo_players")||"[]");
    local.push(data);
    localStorage.setItem("ruzivo_players", JSON.stringify(local));
  }catch(e){}
}

async function loadME(){
  S.meLoading = true; render();
  let players = [];
  if(CONFIG.API_URL){
    try{
      const res = await fetch(CONFIG.API_URL + "?action=list");
      const json = await res.json();
      if(json.ok) players = json.players.map(p=>({...p, score:Number(p.score)||0, pct:Number(p.pct)||0}));
    }catch(e){ console.warn("Backend fetch failed, showing local data only.", e); }
  }
  if(players.length===0){
    try{ players = JSON.parse(localStorage.getItem("ruzivo_players")||"[]"); }catch(e){}
  }
  S.mePlayers = players.sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  S.meLoading = false;
  render();
}

/* ---------- certificate: PGCN dark unified style (Climate Trivia format) ---------- */
function certId(){
  let h=0; const s=(S.name||"")+"|"+S.startedAt;
  for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; }
  return "RZV-"+h.toString(36).toUpperCase().padStart(7,"0").slice(0,7);
}
function buildCert(){
  const W=1200,H=860;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // dark green-navy base with soft radial glow (Climate Trivia palette)
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#102019"); bg.addColorStop(.5,"#0e241b"); bg.addColorStop(1,"#0b1a14");
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const glow=ctx.createRadialGradient(W/2,300,0,W/2,300,620);
  glow.addColorStop(0,"rgba(39,174,96,0.16)"); glow.addColorStop(1,"rgba(39,174,96,0)");
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

  // green double frame
  ctx.strokeStyle="#27AE60"; ctx.lineWidth=6; ctx.strokeRect(14,14,W-28,H-28);
  ctx.strokeStyle="rgba(39,174,96,.35)"; ctx.lineWidth=1.5; ctx.strokeRect(30,30,W-60,H-60);

  // globe :- Africa-facing, from the Climate Trivia identity
  if(GLOBE_IMG.complete && GLOBE_IMG.naturalWidth>0){
    ctx.drawImage(GLOBE_IMG, W/2-31, 26, 62, 62);
  }

  // header :- tri-colour network name
  ctx.textAlign="center";
  ctx.font="bold 15px Arial";
  const hdr=[["PEACE","#4A90D9"],[" · ","#8aa"],["GENDER","#9B59B6"],[" · ","#8aa"],["CLIMATE NETWORK","#27AE60"]];
  let hw=0; hdr.forEach(p=>hw+=ctx.measureText(p[0]).width);
  let hx=W/2-hw/2;
  hdr.forEach(p=>{ ctx.textAlign="left"; ctx.fillStyle=p[1]; ctx.fillText(p[0],hx,112); hx+=ctx.measureText(p[0]).width; });
  ctx.textAlign="center";
  ctx.fillStyle="rgba(255,255,255,.75)"; ctx.font="11px Arial";
  ctx.fillText("PGCN  ·  EGSI CERTIFIED 2026  ·  RUZIVO DEI KNOWLEDGE CHALLENGE", W/2, 134);

  // title
  ctx.fillStyle="#ffffff"; ctx.font='bold 44px "Times New Roman", Georgia, serif';
  ctx.fillText("CERTIFICATE OF COMPLETION", W/2, 190);

  // accuracy ring (signature Climate Trivia element)
  const cx=W/2, cy=310, R=95;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle="rgba(39,174,96,.25)"; ctx.lineWidth=10; ctx.stroke();
  const frac=Math.max(0,Math.min(1,pct()/100));
  ctx.beginPath(); ctx.arc(cx,cy,R,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
  ctx.strokeStyle="#27AE60"; ctx.lineWidth=10; ctx.lineCap="round"; ctx.stroke();
  ctx.fillStyle="#27AE60"; ctx.font="bold 56px Arial";
  ctx.fillText(pct()+"%", cx, cy+8);
  ctx.fillStyle="rgba(255,255,255,.8)"; ctx.font="16px Arial";
  ctx.fillText(S.score+" pts", cx, cy+40);

  // name in PGCN gold
  ctx.fillStyle="#F5A623"; ctx.font='bold 46px "Times New Roman", Georgia, serif';
  ctx.fillText(S.name || "Participant", W/2, 475);

  // context lines
  ctx.fillStyle="rgba(255,255,255,.92)"; ctx.font="16px Arial";
  ctx.fillText("has successfully completed the RUZIVO DEI Knowledge Challenge and demonstrated", W/2, 508);
  ctx.fillText("knowledge, reflection and readiness for inclusive leadership.", W/2, 530);

  const lvl=(S.z5Profile&&(S.z5Profile.level||"").replace(/[^\w\s]/g,"").trim())||"";
  const prof=(S.z7Profile&&(S.z7Profile.profile||"").replace(/[^\w\s]/g,"").trim())||"";
  const capstone=S.capstonePassed?"★ INTEGRATED MASTERY — ZVOSE CAPSTONE":"";
  if(capstone){ ctx.fillStyle="#F5A623"; ctx.font='bold 15px "Times New Roman", Georgia, serif'; ctx.fillText(capstone, W/2, 562); }
  ctx.fillStyle="rgba(255,255,255,.82)"; ctx.font="14px Arial";
  ctx.fillText([lvl,prof].filter(Boolean).join("  ·  "), W/2, capstone?590:562);
  ctx.fillText(`${S.country||""}${S.country&&S.org?" · ":""}${S.org||""}${S.role?" · "+S.role:""}  ·  ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`, W/2, S.capstonePassed?614:586);

  // Peace / Gender / Climate dots
  const dots=[["Peace","#4A90D9"],["Gender","#9B59B6"],["Climate","#27AE60"]];
  dots.forEach((d,i)=>{
    const dx=W/2+(i-1)*170;
    ctx.beginPath(); ctx.arc(dx,656,9,0,Math.PI*2); ctx.fillStyle=d[1]; ctx.fill();
    ctx.fillStyle=d[1]; ctx.font="12px Arial"; ctx.fillText(d[0],dx,684);
  });

  // issuer block :- handwritten signature above the line, printed name beneath
  const sigY=752;
  if(SIG_IMG.complete && SIG_IMG.naturalWidth>0){
    const sw=150, sh=sw*(SIG_IMG.naturalHeight/SIG_IMG.naturalWidth);
    ctx.drawImage(SIG_IMG, 245-sw/2, sigY-sh+4, sw, sh);
  }
  ctx.strokeStyle="rgba(255,255,255,.35)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(110,sigY); ctx.lineTo(380,sigY); ctx.stroke();
  ctx.fillStyle="#ffffff"; ctx.font="bold 13px Arial";
  ctx.fillText("Kingdom Gwangwava", 245, sigY+20);
  ctx.fillStyle="#27AE60"; ctx.font="11px Arial";
  ctx.fillText("Founder & Executive Director, PGCN", 245, sigY+37);

  ctx.fillStyle="rgba(255,255,255,.75)"; ctx.font="11px Arial";
  ctx.fillText("Verification :- "+certId(), W/2, sigY+12);
  ctx.fillText("peacegenderandclimatenetwork.com · Issued under the EGSI framework", W/2, sigY+30);

/* ---------- game logic ---------- */
function startTimer(){
  clearInterval(timerRef); S.timeLeft=30; S.timedOut=false;
  timerRef = setInterval(()=>{
    S.timeLeft = Math.max(0, S.timeLeft-1);
    if(S.timeLeft===0 && !S.shown && !picking){
      clearInterval(timerRef); picking=true; S.shown=true; S.timedOut=true;
      S.lives=Math.max(0,S.lives-1); S.streak=0;
      const q=cur(); const corr = q.t==="tf" ? (q.a?"TRUE ✓":"FALSE ✗") : q.o[q.a];
      S.wrongAnswers.push({q:q.q, correct:corr, your:UI.timesUp, exp:q.e});
    }
    render();
  },1000);
}

function launchZone(zId){
  const zInfo = ZONES.find(z=>z.id===zId);
  S.wrongAnswers=[];
  if(zInfo.type==="toolkit"){ S.z5Idx=0; S.z5Ans=[]; picking=false; S.screen="toolkit"; }
  else{
    if(zId===8){ S.zoneQs = shuffle([ ...Q.filter(q=>q.z===8), ...shuffle(Q.filter(q=>q.z!==8)).slice(0,6) ]); }
    else{ S.zoneQs = shuffle(Q.filter(q=>q.z===zId)); }
    S.zAttempts[zId]=(S.zAttempts[zId]||0)+1; S.zHits[zId]=0; S.zQTotal[zId]=S.zoneQs.length;
    S.zone=zId; S.qIdx=0; S.sel=null; S.shown=false;
    S.hintUsed=false; S.hintText=""; S.timedOut=false; S.zStart=S.score; S.screen="game";
    startTimer();
  }
  render();
}
function startZone(zId){
  const zInfo = ZONES.find(z=>z.id===zId);
  if(zInfo.type==="psychometric"){ S.z7Idx=0; S.z7Ans=[]; picking=false; S.screen="psychometric"; }
  else{ S.conceptZone=zId; S.screen="concept"; }
  render();
}
function pick(i){
  if(S.shown || picking) return;
  clearInterval(timerRef); picking=true; S.sel=i; S.shown=true; S.timedOut=false;
  const q=cur(); const ok = q.t==="tf" ? (i===0)===q.a : i===q.a;
  if(ok){
    sndCorrect();
    const b=S.streak>=2?5:0; S.score+=q.p+b;
    if(S.zone!==8) S.hits++;
    S.zHits[S.zone]=(S.zHits[S.zone]||0)+1;
    S.streak++; S.best=Math.max(S.best,S.streak);
  }else{
    sndWrong();
    S.lives=Math.max(0,S.lives-1); S.streak=0;
    const corr = q.t==="tf" ? (q.a?"TRUE ✓":"FALSE ✗") : q.o[q.a];
    S.wrongAnswers.push({q:q.q, correct:corr, your:q.o?q.o[i]:(i===0?"TRUE ✓":"FALSE ✗"), exp:q.e});
  }
  render();
}
function nextQ(){
  clearInterval(timerRef); picking=false; S.hintUsed=false; S.hintText="";
  if(S.qIdx+1 < S.zoneQs.length){
    S.qIdx++; S.sel=null; S.shown=false; S.timedOut=false; startTimer();
  }else{
    const earned = S.score - S.zStart;
    S.zScores[S.zone]=earned;
    const zTot=S.zQTotal[S.zone]||S.zoneQs.length, zH=S.zHits[S.zone]||0;
    const zPct=Math.round((zH/zTot)*100), zPassed=zPct>=70;
    if(zPassed && !S.passed.includes(S.zone)) S.passed.push(S.zone);
    if(S.zone===8 && zPassed){ S.capstonePassed=true; sndMastery(); } else if(zPassed){ sndZonePass(); }
    S.zoneCompleteData={zoneId:S.zone, score:earned, zPct, zPassed, attempt:S.zAttempts[S.zone]||1};
    S.screen = S.wrongAnswers.length>0 ? "wrongreview" : "zonecomplete";
  }
  render();
}
function useHint(){
  if(S.hintUsed) return;
  S.hintUsed=true; S.score=Math.max(0,S.score-5);
  S.hintText=(cur().e||"").split(".")[0]+"...";
  render();
}
function pickLikert(val,type){
  if(picking) return; picking=true;
  if(type==="toolkit"){
    S.z5Ans[S.z5Idx]=val;
    setTimeout(()=>{
      picking=false;
      if(S.z5Idx+1<PSYCH_Q5.length){ S.z5Idx++; }
      else{
        const r=computeProfile(S.z5Ans,PRACTITIONER_DIMS,PSYCH_Q5);
        S.z5Profile={...r, ...toolkitLevel(r.overall)};
        if(!S.done.includes(5)) S.done.push(5);
        S.screen="map";
      }
      render();
    },200);
  }else{
    S.z7Ans[S.z7Idx]=val;
    setTimeout(()=>{
      picking=false;
      if(S.z7Idx+1<PSYCH_Q7.length){ S.z7Idx++; }
      else{
        const r=computeProfile(S.z7Ans,DIMENSIONS,PSYCH_Q7);
        const prof={...r, ...deiProfileLabel(r.overall)};
        S.z7Profile=prof;
        if(!S.done.includes(7)) S.done.push(7);
        savePlayer(prof);
        S.screen="report";
      }
      render();
    },200);
  }
  render();
}
function resetAll(){
  S.score=0; S.lives=3; S.done=[]; S.hits=0; S.streak=0; S.best=0; S.zScores={};
  S.z5Profile=null; S.z7Profile=null; S.certLoading=false; S.zoneQs=[]; S.wrongAnswers=[];
  S.passed=[]; S.zHits={}; S.zQTotal={}; S.zAttempts={}; S.capstonePassed=false;
  S.flipped={}; S.postSelf=0; S.postSentVal=0; S.startedAt=Date.now();
  clearInterval(timerRef);
}

function screenGame(){

  const opts = q.t==="tf" ? ["TRUE ✓","FALSE ✗"] : q.o;
  const timerPct = (S.timeLeft/30)*100;

  return `

        </div>
        ${S.streak>=2?`<span style="font-size:9px;padding:2px 7px;border-radius:20px;font-weight:bold;background:${C.gold}33;color:${C.gold};">🔥×${S.streak}</span>`:''}

      ${boss?`<div style="border-radius:12px;padding:9px 14px;background:linear-gradient(135deg,${C.red}30,${C.gold}15);border:2px solid ${C.red};margin-bottom:9px;text-align:center;"><p style="color:${C.red};font-weight:900;font-size:13px;letter-spacing:.08em;">⚡ BOSS LEVEL ⚡</p><p style="color:rgba(255,255,255,.8);font-size:10px;">${UI.bossDesc}</p></div>`:''}
      <div class="qcard" style="background:linear-gradient(135deg,${cardColor}${boss?'25':'16'},${cardColor}06);border:1px solid ${cardColor}${boss?'66':'40'};">
        <span class="badge" style="background:${cardColor}30;color:${cardColor};">${badge} · +${q.p}pts${(S.streak>=2&&!S.shown)?' +5🔥':''}</span>
        <p class="qtext">${esc(q.q)}</p>
      </div>
      ${opts.map((opt,i)=>{
        const isAns = q.t==="tf" ? (i===0)===q.a : i===q.a;
        let bg="rgba(255,255,255,.05)",bd="rgba(255,255,255,.08)",fc="rgba(255,255,255,.8)";
        if(S.shown){ if(isAns){bg="#27AE6015";bd="#27AE60";fc="#27AE60";} else if(S.sel===i){bg="#c0392b15";bd="#c0392b";fc="#e74c3c";} }

      ${S.shown?`<div class="explain" style="background:${(S.timedOut? '#c0392b12' : (isOk(q)?'#27AE6012':'#c0392b12'))};border:1px solid ${(S.timedOut?'#c0392b40':(isOk(q)?'#27AE6040':'#c0392b40'))};">

    ${contactBox()}
    ${supportBox()}
    <button class="btn secondary" style="max-width:200px;" onclick="resetAll();S.screen='intro';render()">${UI.again}</button>
  </div>`;
}

/* ---------- sound engine :- Web Audio, generated tones, fully offline ---------- */
let AC = null;
function tone(freq, start, dur, vol, type){
  try{
    if(!S.sound) return;
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const t = AC.currentTime + start;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||"sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol||0.18, t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
function sndCorrect(){ tone(660,0,.12,.16); tone(880,.11,.16,.16); }
function sndWrong(){ tone(240,0,.22,.10,"triangle"); }
function sndFlip(){ tone(1200,0,.05,.08,"square"); }
function sndZonePass(){ tone(523,0,.14,.16); tone(659,.13,.14,.16); tone(784,.26,.24,.18); }
function sndMastery(){ tone(523,0,.14,.18); tone(659,.13,.14,.18); tone(784,.26,.14,.18); tone(1046,.4,.4,.2); }
function toggleSound(){ S.sound=!S.sound; if(S.sound) sndCorrect(); render(); }

function updateBeginBtn(){
  const b = document.getElementById('beginBtn');
  if(!b) return;
  const ok = S.country.trim().length > 0;
  b.disabled = !ok;
  b.style.opacity = ok ? '1' : '.4';
}

function render(){
  const app = document.getElementById("app");
  let html = "";
  switch(S.screen){
    case "intro": html = screenIntro(); break;
    case "register": html = screenRegister(); break;
    case "concept": html = screenConcept(); break;
    case "map": html = screenMap(); break;
    case "zonecomplete": html = screenZoneComplete(); break;
    case "wrongreview": html = screenWrongReview(); break;
    case "game": html = screenGame(); break;
    case "toolkit": html = screenLikert("toolkit"); break;
    case "psychometric": html = screenLikert("psychometric"); break;
    case "leaderboard": html = screenLeaderboard(); break;
    case "me": html = screenME(); break;
    case "report": html = screenReport(); break;
    default: html = screenIntro();
  }
  app.innerHTML = html + `<button class="sndbtn" aria-label="${S.sound?'Mute sounds':'Unmute sounds'}" onclick="toggleSound()">${S.sound?'🔊':'🔇'}</button>`;
  if(S.screen==="zonecomplete") spawnConfetti();
}
function spawnConfetti(){
  const host = document.getElementById("confettiHost");
  if(!host) return;
  const colors=[C.gold,C.blue,C.green,C.purple,C.pink,C.teal,C.red];
  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="confetti-piece";
    const size=6+Math.random()*6;
    p.style.left=(Math.random()*100)+"%";
    p.style.width=size+"px"; p.style.height=size+"px";
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius=Math.random()>0.5?"50%":"2px";
    p.style.animationDuration=(1.4+Math.random()*1.2)+"s";
    p.style.animationDelay=(Math.random()*0.8)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

render();
